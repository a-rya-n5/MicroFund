<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>MicroFund | Secure Micro-Lending</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Font -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <style>
    /* ===============================
       GLOBAL RESET + BASE
       =============================== */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Inter', sans-serif;
    }

    body {
      min-height: 100vh;
      background: radial-gradient(
          circle at top left,
          rgba(79, 70, 229, 0.25),
          transparent 40%
        ),
        radial-gradient(
          circle at bottom right,
          rgba(14, 165, 233, 0.25),
          transparent 40%
        ),
        linear-gradient(135deg, #020617, #020617);
      display: flex;
      align-items: center;
      justify-content: center;
      color: #e5e7eb;
      overflow: hidden;
    }

    /* ===============================
       BACKGROUND DECOR (SUBTLE)
       =============================== */
    .glow {
      position: absolute;
      width: 400px;
      height: 400px;
      background: radial-gradient(circle, rgba(99,102,241,0.35), transparent 70%);
      filter: blur(120px);
      z-index: 0;
    }

    .glow.one { top: -100px; left: -100px; }
    .glow.two { bottom: -100px; right: -100px; }

    /* ===============================
       MAIN CARD
       =============================== */
    .auth-container {
      position: relative;
      z-index: 1;
      width: 420px;
      padding: 40px;
      border-radius: 18px;
      background: rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(18px);
      border: 1px solid rgba(255, 255, 255, 0.15);
      box-shadow: 0 30px 80px rgba(0, 0, 0, 0.45);
      animation: fadeUp 0.9s ease forwards;
    }

    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(30px) scale(0.98);
      }
      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    /* ===============================
       BRANDING
       =============================== */
    .brand {
      margin-bottom: 32px;
    }

    .brand h1 {
      font-size: 2.1rem;
      font-weight: 800;
      letter-spacing: -0.5px;
      background: linear-gradient(90deg, #818cf8, #38bdf8);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .brand p {
      margin-top: 6px;
      font-size: 0.95rem;
      color: #9ca3af;
    }

    /* ===============================
       FORM
       =============================== */
    .form-group {
      margin-bottom: 18px;
    }

    label {
      display: block;
      font-size: 0.8rem;
      font-weight: 600;
      color: #c7d2fe;
      margin-bottom: 6px;
    }

    input {
      width: 100%;
      padding: 14px 14px;
      border-radius: 12px;
      border: 1px solid rgba(255,255,255,0.18);
      background: rgba(255,255,255,0.06);
      color: #e5e7eb;
      font-size: 0.95rem;
      outline: none;
      transition: all 0.25s ease;
    }

    input::placeholder {
      color: #9ca3af;
    }

    input:focus {
      border-color: #60a5fa;
      background: rgba(255,255,255,0.1);
      box-shadow: 0 0 0 4px rgba(96,165,250,0.25);
    }

    /* ===============================
       BUTTON
       =============================== */
    .login-btn {
      margin-top: 10px;
      width: 100%;
      padding: 14px;
      border-radius: 14px;
      border: none;
      font-size: 1rem;
      font-weight: 700;
      color: #020617;
      background: linear-gradient(90deg, #818cf8, #38bdf8);
      cursor: pointer;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }

    .login-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 20px 40px rgba(56, 189, 248, 0.35);
    }

    /* ===============================
       FOOTER LINKS
       =============================== */
    .footer-text {
      margin-top: 24px;
      font-size: 0.85rem;
      text-align: center;
      color: #9ca3af;
    }

    .footer-text a {
      color: #60a5fa;
      font-weight: 600;
      text-decoration: none;
    }

    .footer-text a:hover {
      text-decoration: underline;
    }
  </style>
</head>

<body>

  <!-- Background glow -->
  <div class="glow one"></div>
  <div class="glow two"></div>

  <!-- Login Card -->
  <div class="auth-container">

    <div class="brand">
      <h1>MicroFund</h1>
      <p>Empowering micro-lending through secure digital finance</p>
    </div>

    <form id="loginForm">
      <div class="form-group">
        <label>Email address</label>
        <input type="email" id="email" placeholder="you@example.com" required>
      </div>

      <div class="form-group">
        <label>Password</label>
        <input type="password" id="password" placeholder="Enter your password" required>
      </div>

      <button type="submit" class="login-btn">Sign in</button>
    </form>

    <div class="footer-text">
      New to MicroFund?
      <a href="register.html">Create an account</a>
    </div>

  </div>

  <script src="js/role-router.js"></script>

  <script>
    const API_BASE = "http://localhost:5000/api";

    document.getElementById("loginForm").addEventListener("submit", async (e) => {
      e.preventDefault();

      const email = document.getElementById("email").value;
      const password = document.getElementById("password").value;

      try {
        const res = await fetch(API_BASE + "/auth/login", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ email, password })
        });

        const data = await res.json();

        if (!res.ok) {
          alert(data.message || "Login failed");
          return;
        }

        localStorage.setItem("token", data.token);
        redirectByRole();
      } catch {
        alert("Server not reachable");
      }
    });
  </script>

</body>
</html>
