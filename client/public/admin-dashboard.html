<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>MicroFund | Admin Dashboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Font -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <style>
    /* ===============================
       RESET + BASE
       =============================== */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Inter', sans-serif;
    }

    body {
      min-height: 100vh;
      background:
        radial-gradient(circle at top left, rgba(239,68,68,0.25), transparent 40%),
        radial-gradient(circle at bottom right, rgba(168,85,247,0.25), transparent 40%),
        #020617;
      color: #e5e7eb;
    }

    /* ===============================
       LAYOUT
       =============================== */
    .dashboard {
      display: grid;
      grid-template-columns: 270px 1fr;
      min-height: 100vh;
    }

    /* ===============================
       SIDEBAR
       =============================== */
    .sidebar {
      background: rgba(255,255,255,0.05);
      border-right: 1px solid rgba(255,255,255,0.08);
      backdrop-filter: blur(16px);
      padding: 28px 22px;
    }

    .brand {
      font-size: 1.7rem;
      font-weight: 800;
      background: linear-gradient(90deg, #f43f5e, #a855f7);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 42px;
    }

    .nav a {
      display: block;
      padding: 14px 16px;
      margin-bottom: 12px;
      border-radius: 14px;
      text-decoration: none;
      font-weight: 600;
      color: #fecaca;
      transition: all 0.25s ease;
    }

    .nav a.active,
    .nav a:hover {
      background: rgba(239,68,68,0.18);
      color: #fff;
    }

    .logout {
      margin-top: 40px;
      width: 100%;
      padding: 14px;
      border-radius: 14px;
      border: none;
      font-weight: 700;
      background: linear-gradient(90deg, #ef4444, #f97316);
      color: #020617;
      cursor: pointer;
    }

    /* ===============================
       MAIN
       =============================== */
    .main {
      padding: 36px;
    }

    .header {
      margin-bottom: 32px;
    }

    .header h1 {
      font-size: 2rem;
      font-weight: 800;
    }

    .header p {
      margin-top: 6px;
      color: #9ca3af;
      font-size: 0.95rem;
    }

    /* ===============================
       STATS
       =============================== */
    .stats {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(230px, 1fr));
      gap: 22px;
      margin-bottom: 40px;
    }

    .stat-card {
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 20px;
      padding: 26px;
      backdrop-filter: blur(18px);
      box-shadow: 0 30px 80px rgba(0,0,0,0.5);
      animation: rise 0.8s ease forwards;
    }

    @keyframes rise {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .stat-title {
      font-size: 0.85rem;
      color: #9ca3af;
      margin-bottom: 6px;
    }

    .stat-value {
      font-size: 1.9rem;
      font-weight: 800;
      background: linear-gradient(90deg, #f87171, #c084fc);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    /* ===============================
       TABLES
       =============================== */
    .section {
      margin-bottom: 42px;
    }

    .section h2 {
      font-size: 1.35rem;
      font-weight: 700;
      margin-bottom: 16px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      background: rgba(255,255,255,0.07);
      border-radius: 18px;
      overflow: hidden;
      backdrop-filter: blur(18px);
      box-shadow: 0 25px 70px rgba(0,0,0,0.45);
    }

    th, td {
      padding: 16px;
      text-align: left;
      font-size: 0.9rem;
    }

    th {
      background: rgba(255,255,255,0.08);
      color: #9ca3af;
      font-weight: 600;
    }

    tr:not(:last-child) {
      border-bottom: 1px solid rgba(255,255,255,0.08);
    }

    .approve-btn {
      padding: 10px 14px;
      border-radius: 12px;
      border: none;
      font-weight: 700;
      background: linear-gradient(90deg, #22c55e, #4ade80);
      color: #020617;
      cursor: pointer;
    }

    .reject-btn {
      padding: 10px 14px;
      border-radius: 12px;
      border: none;
      font-weight: 700;
      background: linear-gradient(90deg, #ef4444, #fb7185);
      color: #020617;
      cursor: pointer;
      margin-left: 6px;
    }
  </style>
</head>

<body>

<div class="dashboard">

  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div class="brand">MicroFund Admin</div>

    <nav class="nav">
      <a class="active">Overview</a>
      <a>Loan Approvals</a>
      <a>Users</a>
      <a>Transactions</a>
      <a>System Logs</a>
    </nav>

    <button class="logout" onclick="logout()">Logout</button>
  </aside>

  <!-- MAIN -->
  <main class="main">

    <div class="header">
      <h1>System Control Center</h1>
      <p>Monitor platform health, approve loans, and manage users</p>
    </div>

    <!-- STATS -->
    <div class="stats">
      <div class="stat-card">
        <div class="stat-title">Total Users</div>
        <div class="stat-value" id="totalUsers">—</div>
      </div>

      <div class="stat-card">
        <div class="stat-title">Active Loans</div>
        <div class="stat-value" id="activeLoans">—</div>
      </div>

      <div class="stat-card">
        <div class="stat-title">Pending Approvals</div>
        <div class="stat-value" id="pendingApprovals">—</div>
      </div>

      <div class="stat-card">
        <div class="stat-title">Total Capital Deployed</div>
        <div class="stat-value" id="totalCapital">—</div>
      </div>
    </div>

    <!-- LOAN APPROVALS -->
    <section class="section">
      <h2>Loan Approval Queue</h2>

      <table>
        <thead>
          <tr>
            <th>Borrower</th>
            <th>Amount</th>
            <th>Tenure</th>
            <th>Credit Score</th>
            <th>Action</th>
          </tr>
        </thead>

        <!-- 🔴 DYNAMIC CONTENT GOES HERE -->
        <tbody id="loanTableBody"></tbody>
      </table>
    </section>

  </main>
</div>

<script>
  function logout() {
    localStorage.removeItem("token");
    window.location.href = "index.html";
  }
</script>

<!-- REQUIRED FOR LIVE DATA -->
<script src="js/api.js"></script>
<script src="js/admin.js"></script>

</body>
</html>
